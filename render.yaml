services:
  # 🟢 Backend Web Service (Node.js + Prisma 7)
  - type: web
    name: realityforge-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: realityforge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # User must provide this in the dashboard
      - key: CORS_ORIGIN
        fromService:
          type: static_site
          name: realityforge-frontend
          property: url

  # 🔵 Frontend Static Site (Vite)
  - type: static_site
    name: realityforge-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: realityforge-backend
          property: url
          suffix: /api

databases:
  # 🟣 Managed PostgreSQL
  - name: realityforge-db
    plan: starter
    region: oregon
    postgresMajorVersion: 16
